<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeVault - Acesso Restrito</title>
    <style>
        /* Variáveis de cor padronizadas do SafeVault */
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #1a1a1a;
            --yellow-safe: #FFC107;
            --yellow-hover: #ffca28;
            --text-light: #ffffff;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background-color: var(--bg-panel);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--yellow-safe); /* Detalhe amarelo no topo */
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-box h1 { margin-top: 0; color: var(--text-light); font-size: 24px;}
        .login-box h1 span { color: var(--yellow-safe); }
        .subtitle { color: #9e9e9e; margin-bottom: 30px; font-size: 14px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--bg-dark);
            color: white;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--yellow-safe);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--yellow-safe);
            color: var(--bg-dark);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: var(--yellow-hover); }

        .erro {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1><span>🚧</span> SafeVault</h1>
        <p class="subtitle">Acesso restrito ao cofre mestre</p>
        
        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="email" name="email" placeholder="E-mail Mestre" required>
            <input type="password" name="senha" placeholder="Senha Mestra" required>
            <button type="submit">Desbloquear Cofre</button>
        </form>
    </div>

</body>
</html>
